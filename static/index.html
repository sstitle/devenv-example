<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Collaborative Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 14px;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .panels {
      display: flex;
      flex: 1;
      gap: 1px;
      padding: 0 16px 16px;
      min-height: 0;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    .conn-status {
      margin-left: auto;
      font-size: 0.7rem;
      color: #555;
      font-weight: normal;
    }
    .conn-status.connected { color: #2ecc71; }

    textarea {
      flex: 1;
      background: #16213e;
      color: #e8e8e8;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 14px;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: var(--user-color);
    }

    .presence {
      height: 22px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
    }

    .cursor-badge {
      padding: 2px 8px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <header>collaborative editor — two clients, one room</header>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <div class="dot" style="background:#e74c3c"></div>
        Alice
        <span class="conn-status" id="alice-status">connecting…</span>
      </div>
      <textarea id="alice-editor" placeholder="Start typing…" style="--user-color:#e74c3c"></textarea>
      <div class="presence" id="alice-presence"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="dot" style="background:#3498db"></div>
        Bob
        <span class="conn-status" id="bob-status">connecting…</span>
      </div>
      <textarea id="bob-editor" placeholder="Start typing…" style="--user-color:#3498db"></textarea>
      <div class="presence" id="bob-presence"></div>
    </div>
  </div>

  <script type="module">
    import * as Y from 'https://esm.sh/yjs@13'
    import { WebsocketProvider } from 'https://esm.sh/y-websocket@1'

    const USERS = [
      { name: 'Alice', color: '#e74c3c', editorId: 'alice-editor', statusId: 'alice-status', presenceId: 'alice-presence' },
      { name: 'Bob',   color: '#3498db', editorId: 'bob-editor',   statusId: 'bob-status',   presenceId: 'bob-presence'   },
    ]

    for (const user of USERS) {
      const doc      = new Y.Doc()
      const ytext    = doc.getText('content')
      const provider = new WebsocketProvider(`ws://${location.host}/ws`, 'demo-room', doc)
      const editor   = document.getElementById(user.editorId)
      const status   = document.getElementById(user.statusId)
      const presence = document.getElementById(user.presenceId)

      // Announce identity to other clients via the awareness protocol
      provider.awareness.setLocalState({ name: user.name, color: user.color, cursor: null })

      // Connection status badge
      provider.on('status', ({ status: s }) => {
        status.textContent = s
        status.className = 'conn-status' + (s === 'connected' ? ' connected' : '')
      })

      // Y.Text → textarea: when a remote update arrives, patch the textarea value
      ytext.observe(() => {
        const val = ytext.toString()
        if (editor.value === val) return
        // Preserve caret position across the update
        const { selectionStart, selectionEnd } = editor
        editor.value = val
        editor.setSelectionRange(selectionStart, selectionEnd)
      })

      // textarea → Y.Text: compute a minimal diff and apply it as a Yjs transaction
      editor.addEventListener('input', () => {
        const next = editor.value
        const prev = ytext.toString()
        if (next === prev) return

        // Find the unchanged prefix
        let start = 0
        while (start < prev.length && start < next.length && prev[start] === next[start]) start++

        // Find the unchanged suffix
        let oldEnd = prev.length
        let newEnd = next.length
        while (oldEnd > start && newEnd > start && prev[oldEnd - 1] === next[newEnd - 1]) { oldEnd--; newEnd-- }

        doc.transact(() => {
          if (oldEnd > start)  ytext.delete(start, oldEnd - start)
          if (newEnd > start)  ytext.insert(start, next.slice(start, newEnd))
        })
      })

      // Publish cursor/selection into awareness on every caret move
      const publishCursor = () => {
        provider.awareness.setLocalStateField('cursor', {
          start: editor.selectionStart,
          end:   editor.selectionEnd,
        })
      }
      editor.addEventListener('keyup',   publishCursor)
      editor.addEventListener('mouseup', publishCursor)
      editor.addEventListener('focus',   publishCursor)

      // Render the other user's cursor position below this panel
      provider.awareness.on('change', () => {
        const others = [...provider.awareness.getStates().entries()]
          .filter(([id]) => id !== provider.awareness.clientID)
          .map(([, state]) => state)
          .filter(s => s?.cursor != null)

        presence.innerHTML = others.length
          ? others.map(({ name, color, cursor: { start, end } }) => {
              const label = start === end ? `pos ${start}` : `sel ${start}–${end}`
              return `<span class="cursor-badge" style="background:${color}22;color:${color}">${name}: ${label}</span>`
            }).join('')
          : ''
      })
    }
  </script>
</body>
</html>
